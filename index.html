<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planes de Salud y Entrenamiento</title>
<style>
  :root {
    --primary: #7C3AED;
    --primary-light: #A78BFA;
    --bg: #F5F3FF;
    --text: #1E1B4B;
    --text-muted: #6B7280;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #5B21B6, #7C3AED, #A78BFA);
    color: white; padding: 2.5rem 1.5rem 2rem;
    text-align: center;
  }
  .header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: .4rem; }
  .header p { font-size: .9rem; opacity: .85; }
  .container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem; }
  .section-title {
    font-size: .72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--text-muted); margin-bottom: .75rem;
  }
  .plan-card {
    background: white; border-radius: 16px; padding: 1.1rem 1.25rem;
    box-shadow: var(--shadow); margin-bottom: .75rem;
    display: flex; align-items: center; gap: 1rem;
    text-decoration: none; color: inherit;
    transition: transform .15s, box-shadow .15s;
  }
  .plan-card:active { transform: scale(.98); }
  .plan-avatar {
    width: 50px; height: 50px; border-radius: 12px;
    background: #EDE9FE; display: flex; align-items: center;
    justify-content: center; font-size: 1.5rem; flex-shrink: 0;
  }
  .plan-info { flex: 1; }
  .plan-name { font-size: .95rem; font-weight: 700; }
  .plan-meta { font-size: .76rem; color: var(--text-muted); margin-top: .15rem; }
  .plan-badge {
    font-size: .7rem; font-weight: 700; padding: .2rem .55rem;
    border-radius: 20px; background: #EDE9FE; color: var(--primary);
  }
  .arrow { color: var(--primary-light); font-size: 1.1rem; }
  .footer { text-align: center; padding: 2rem 1rem; font-size: .75rem; color: var(--text-muted); }
  .footer strong { color: var(--primary); }
</style>
</head>
<body>

<div class="header">
  <h1>Planes de Salud</h1>
  <p>Programas personalizados de entrenamiento y nutrición</p>
</div>

<div class="container">

  <div class="section-title">Planes activos</div>

  <a class="plan-card" href="plan-natalia-ramirez.html">
    <div class="plan-avatar">👩</div>
    <div class="plan-info">
      <div class="plan-name">Natalia Ramírez Henao</div>
      <div class="plan-meta">74 kg → 66 kg · Gym 3x/semana · 3 comidas/día</div>
    </div>
    <div class="plan-badge">-8 kg</div>
    <div class="arrow">›</div>
  </a>

</div>

<div class="footer">
  Planes elaborados por <strong>Oscar Ramírez</strong>
</div>

</body>
</html>
